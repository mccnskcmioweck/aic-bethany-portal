{% extends 'base.html' %}
{% block title %}Login – AIC Bethany{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-5">
  <div class="card"><div class="card-header text-center py-3"><h4 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Member Login</h4></div>
  <div class="card-body p-4">
    <form method="post">{% csrf_token %}
      {% for field in form %}
      <div class="mb-3"><label class="form-label fw-semibold">{{ field.label }}</label>
        <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" class="form-control {% if field.errors %}is-invalid{% endif %}" {% if field.value %}value="{{ field.value }}"{% endif %}>
        {% for error in field.errors %}<div class="invalid-feedback">{{ error }}</div>{% endfor %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-church w-100 py-2"><i class="bi bi-box-arrow-in-right"></i> Login</button>
    </form>
    <hr><p class="text-center mb-0">New to AIC Bethany? <a href="{% url 'register' %}">Register here</a></p>
  </div></div>
</div></div></div>
{% endblock %}
